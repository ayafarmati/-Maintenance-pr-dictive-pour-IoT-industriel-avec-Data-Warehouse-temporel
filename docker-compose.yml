  spark-client:
    image: iot-spark-hudi:3.5.6-0.15.0
    build:
      context: ./docker/spark
      args:
        HUDI_VERSION: 0.15.0
        SCALA_VERSION: 2.12
    container_name: iot-spark-client
    hostname: spark-client
    depends_on:
      - spark-master
      - spark-worker
    environment:
      SPARK_MASTER_URL: spark://spark-master:7077
      PYSPARK_PYTHON: python3
      PYSPARK_DRIVER_PYTHON: python3
    volumes:
      - ./spark/apps:/opt/spark-apps
      - ./spark/data:/opt/spark-data
      - ./spark/checkpoints:/opt/spark-checkpoints
    working_dir: /opt/spark-apps
    entrypoint: ["/bin/bash", "-lc"]
    command: ["sleep infinity"]
    networks:
      - iot-platform

  minio:
    image: minio/minio:latest
    container_name: iot-minio
    hostname: minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - iot-platform

  minio-mc:
    image: minio/mc:latest
    container_name: iot-minio-mc
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mc alias set local http://minio:9000 minio minio123
        mc mb -p local/iot-lake || true
        mc policy set public local/iot-lake
        echo "MinIO bucket ready: iot-lake"
    networks:
      - iot-platform

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: iot-mosquitto
    hostname: mosquitto
    depends_on:
      - mosquitto-init
    ports:
      - "1884:1883"
      - "9002:9001"
    volumes:
      - ./docker/mosquitto/config:/mosquitto/config
      - mosquitto-data:/mosquitto/data
      - mosquitto-logs:/mosquitto/log
    networks:
      - iot-platform

  mosquitto-init:
    image: eclipse-mosquitto:2.0
    container_name: iot-mosquitto-init
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mkdir -p /mosquitto/config
        if [ ! -f /mosquitto/config/passwords.txt ]; then
          touch /mosquitto/config/passwords.txt
          mosquitto_passwd -b /mosquitto/config/passwords.txt iot iot123
          echo "Mosquitto user created: iot"
        fi
        chmod 700 /mosquitto/config/passwords.txt
    volumes:
      - ./docker/mosquitto/config:/mosquitto/config
    networks:
      - iot-platform

  mqtt-bridge:
    build:
      context: ./docker/mqtt-bridge
    container_name: iot-mqtt-bridge
    depends_on:
      - mosquitto
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_TOPIC: iot/sensors
      MQTT_USER: iot
      MQTT_PASSWORD: iot123
      OUTPUT_DIR: /data/mqtt_raw
      LOG_EVERY: "1"
    volumes:
      - ./spark/data:/data
    networks:
      - iot-platform

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: iot-clickhouse
    hostname: clickhouse
    environment:
      CLICKHOUSE_DB: iot
      CLICKHOUSE_USER: iot
      CLICKHOUSE_PASSWORD: iot123
    ports:
      - "8123:8123"
      - "9003:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    networks:
      - iot-platform

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.1
    container_name: iot-mlflow
    hostname: mlflow
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
    command:
      - /bin/sh
      - -c
      - |
        mlflow server \
          --backend-store-uri sqlite:////mlflow/mlflow.db \
          --default-artifact-root s3://iot-lake/mlflow \
          --host 0.0.0.0 \
          --port 5000
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    depends_on:
      - minio
    networks:
      - iot-platform

  ml-train:
    image: python:3.11-slim
    container_name: iot-ml-train
    working_dir: /app
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      TRAIN_DATA_URI: s3://iot-lake/datasets/train_FD001_avec_RUL.csv
      TRAIN_DATA_DELIMITER: ";"
    volumes:
      - ./ml:/app
    command:
      - /bin/sh
      - -c
      - |
        pip install --no-cache-dir -r /app/requirements.txt && \
        python /app/train_xgboost.py
    depends_on:
      - mlflow
      - minio
    networks:
      - iot-platform

networks:
  iot-platform:
    name: iot-platform
    driver: bridge

volumes:
  airflow-postgres-data:
    name: airflow-postgres-data
  minio-data:
    name: minio-data
  mosquitto-data:
    name: mosquitto-data
  mosquitto-logs:
    name: mosquitto-logs
  clickhouse-data:
    name: clickhouse-data
  mlflow-data:
    name: mlflow-data
